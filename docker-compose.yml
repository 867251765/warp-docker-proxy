services:
  warp-proxy:
    image: "867251765/warp-docker-proxy:latest"
    container_name: warp-docker-proxy
    hostname: warp-docker-proxy
    ports:
      - "51080:1080"
    restart: unless-stopped    
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun      
    environment:
      - DEBIAN_FRONTEND=noninteractive
      # Set THE WARP_TOKEN if you want to use ZeroTrust 
      # it must start with "com.cloudflare.warp://"
      - WARP_TOKEN=
    volumes:
      - ./data:/var/lib/cloudflare-warp
    healthcheck:
      test: ["CMD", "warp-cli", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
